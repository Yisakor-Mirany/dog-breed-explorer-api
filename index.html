<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Breed Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Dog Breed Explorer</h1>
    <p>Browse dog breeds using the Dog API.</p>

    <button id="loadBreedsBtn">Load Dog Breeds</button>

    <div class="dropdown-section">
      <label for="breedSelect">Select a Dog Breed</label>
      <select id="breedSelect">
        <option value="">-- Select a breed --</option>
      </select>
    </div>

    <p id="statusMessage"></p>

    <div id="breedDetails" class="card">
      <h2>Breed Details</h2>
      <div id="detailsContent">
        <p>No breed selected yet.</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
